name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check helios/ tests/ benchmark.py load_gen/
      - run: ruff format --check helios/ tests/ benchmark.py load_gen/
      - run: mypy helios/
      - run: pytest tests/ -v --tb=short
        env:
          HYPOTHESIS_PROFILE: ci
